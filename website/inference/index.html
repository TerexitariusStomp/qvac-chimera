<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chimera Casper Contract Dashboard</title>
    <script type="module" crossorigin src="./assets/index-_jwEvCrE.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-6CK-ry_X.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="chimera-fleet" style="position:fixed;bottom:12px;right:12px;z-index:9999;font-family:ui-monospace,monospace;font-size:12px;background:rgba(10,10,18,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;color:#b0a898;max-width:320px;max-height:360px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span id="fleet-dot" style="width:8px;height:8px;border-radius:50%;background:#450a0a;"></span>
        <span style="font-weight:700;color:#e8e2d8;">Chimera Fleet</span>
        <span id="fleet-count" style="margin-left:auto;font-size:11px;color:#7a7468;">-</span>
      </div>
      <div id="fleet-body" style="line-height:1.6;">Checking fleet...</div>
    </div>
    <script>
      (async function poll() {
        const dot = document.getElementById('fleet-dot');
        const body = document.getElementById('fleet-body');
        const count = document.getElementById('fleet-count');
        const API = (window._chimeraApi || 'http://147.79.71.192:3006').replace(/\/$/, '');
        try {
          const statusRes = await fetch(API + '/api/status', { credentials: 'omit' }).catch(() => ({ ok: false }));
          const status = statusRes.ok ? await statusRes.json() : null;
          const fleet = status?.fleet;
          const workers = fleet?.workers || [];
          const onlineWorkers = workers.filter(w => w.online);

          if (!status) {
            dot.style.background = '#450a0a';
            count.textContent = 'offline';
            body.innerHTML = 'Backend offline.<br><span style="color:#7a7468;font-size:11px;">Download Chimera to connect your node.</span>';
          } else if (workers.length === 0) {
            dot.style.background = '#fbbf24';
            count.textContent = '0 nodes';
            body.innerHTML = 'No miners registered yet.<br><span style="color:#7a7468;font-size:11px;">Start mining on a Chimera node to appear here.</span>';
          } else {
            dot.style.background = '#4ade80';
            dot.style.boxShadow = '0 0 6px #4ade80';
            count.textContent = onlineWorkers.length + '/' + workers.length + ' online';

            let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
            for (const w of workers) {
              const color = w.online ? '#86efac' : '#7a7468';
              const bg = w.online ? 'rgba(34,197,94,0.08)' : 'rgba(255,255,255,0.02)';
              const shortUrl = w.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
              const evmShort = w.evmAddress ? w.evmAddress.slice(0, 6) + '...' + w.evmAddress.slice(-4) : '—';
              html +=
                '<div style="padding:8px 10px;border-radius:6px;background:' + bg + ';border:1px solid ' + (w.online ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.04)') + ';">' +
                '<div style="display:flex;align-items:center;gap:6px;">' +
                '<span style="width:6px;height:6px;border-radius:50%;background:' + color + ';"></span>' +
                '<span style="font-weight:600;color:' + color + ';">' + shortUrl + '</span>' +
                '</div>' +
                '<div style="font-size:11px;color:#7a7468;margin-top:4px;">' +
                'EVM: ' + evmShort + ' · Cap: ' + (w.capacity || 1) +
                (w.inferenceReady ? ' · Inference' : '') +
                '</div>' +
                '</div>';
            }
            html += '</div>';
            body.innerHTML = html;
          }
        } catch (e) {
          dot.style.background = '#450a0a';
          count.textContent = 'error';
          body.innerHTML = 'Backend offline.<br><span style="color:#7a7468;font-size:11px;">Download Chimera to connect your node.</span>';
        }
        setTimeout(poll, 5000);
      })();
    </script>
  </body>
</html>
