<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployments — Chimera Console</title>
  <meta name="description" content="Manage your active, pending, and closed deployments on the Chimera Console.">
  <link rel="icon" type="image/png" href="chimeralogo.png">
  <style>
    :root{--primary:#7c3aed;--primary-dark:#6d28d9;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(15,23,42,0.08)}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);height:100%}
    .app{display:flex;min-height:100vh}
    .sidebar{width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:30}
    .sidebar-header{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text)}
    .sidebar-logo img{width:34px;height:34px;border-radius:8px}
    .sidebar-brand{font-size:18px;font-weight:700;letter-spacing:-0.3px}
    .sidebar-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:14px;font-weight:500;transition:background .15s,color .15s}
    .nav-item:hover{background:#f1f5f9;color:var(--text)}
    .nav-item.active{background:#ede9fe;color:var(--primary)}
    .nav-item svg{width:20px;height:20px;flex-shrink:0}
    .deploy-btn{margin:16px 20px 20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s,transform .05s}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{background:#f8fafc}
    .main{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column}
    .topbar{height:64px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:20}
    .breadcrumb{font-size:14px;font-weight:600;color:var(--text)}
    .topbar-actions{display:flex;align-items:center;gap:12px}
    .content{padding:28px;flex:1}
    .page-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
    .page-title{font-size:22px;font-weight:700;margin:0}
    .filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .filter-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer}
    .filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .deployments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .deployment-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;transition:box-shadow .15s,transform .05s}
    .deployment-card:hover{box-shadow:0 4px 12px rgba(15,23,42,0.1)}
    .deployment-header{display:flex;align-items:start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .deployment-title{font-size:15px;font-weight:700;margin:0;word-break:break-word}
    .deployment-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#f1f5f9;color:var(--muted)}
    .status.active{background:#dcfce7;color:#15803d}
    .status.pending{background:#fef3c7;color:#b45309}
    .status.closed{background:#f1f5f9;color:#64748b}
    .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .deployment-resources{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .resource{text-align:center}
    .resource-value{font-size:14px;font-weight:700;color:var(--text)}
    .resource-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
    .deployment-footer{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .deployment-cost{font-size:13px;color:var(--muted)}
    .deployment-cost strong{color:var(--text)}
    .card-actions{display:flex;gap:8px}
    .card-actions .btn{padding:7px 12px;font-size:12px}
    .empty-state{text-align:center;padding:60px 20px;background:var(--panel);border:1px dashed var(--border);border-radius:var(--radius);margin-top:8px}
    .empty-state h3{font-size:18px;font-weight:700;margin:0 0 8px}
    .empty-state p{color:var(--muted);font-size:14px;margin:0 0 18px}
    .mobile-nav-btn{display:none;position:fixed;top:14px;left:14px;z-index:40;background:var(--panel);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
    .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:25}
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform .25s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .mobile-nav-btn,.mobile-overlay{display:flex}
      .mobile-overlay.open{display:block}
      .topbar{padding:0 16px 0 60px}
      .content{padding:18px}
      .deployment-resources{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:640px){
      .deployments-grid{grid-template-columns:1fr}
      .page-header{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>

<button class="mobile-nav-btn" id="mobileNavBtn" onclick="toggleMobileNav()" aria-label="Menu">☰</button>
<div class="mobile-overlay" id="mobileNavOverlay" onclick="closeMobileNav()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-header">
      <div class="sidebar-logo"><img src="chimeralogo-header.png" alt="Chimera"></div>
      <div class="sidebar-brand">Chimera</div>
    </a>
    <nav class="sidebar-nav">
      <a href="console.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </a>
      <a href="deployments.html" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Deployments
      </a>
      <a href="rental.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
        Create Rental
      </a>
      <a href="deploy.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        Deploy
      </a>
      <a href="templates.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Templates
      </a>
      <a href="sdl-builder.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        SDL Builder
      </a>
      <a href="providers.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Providers
      </a>
      <a href="earnings.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Earnings
      </a>
      <a href="demo-wiki.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
        Wiki
      </a>
      <a href="https://github.com/LocalChimera/localchimera" target="_blank" rel="noopener" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
        GitHub
      </a>
    </nav>
    <a href="deploy.html" class="btn btn-primary deploy-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      Deploy
    </a>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="breadcrumb">Deployments</span>
      <div class="topbar-actions">
        <a href="deploy.html" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Deployment
        </a>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <h1 class="page-title">Your Deployments</h1>
      </div>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="closed">Closed</button>
      </div>

      <div class="deployments-grid" id="deploymentsGrid"></div>
    </main>
  </div>
</div>

<script>
  function toggleMobileNav(){
    const sidebar=document.getElementById('sidebar');
    const overlay=document.getElementById('mobileNavOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  }
  function closeMobileNav(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobileNavOverlay').classList.remove('open');
  }

  const deployments=[
    {id:'dpl-1a2b3c', name:'llama-3-1-8b', image:'ollama/ollama:latest', status:'active', cpu:4, gpu:0, memory:8, storage:20, created:'2 hours ago', cost:'0.24 AKT/hr'},
    {id:'dpl-4d5e6f', name:'jupyter-data-stack', image:'jupyter/datascience-notebook:latest', status:'active', cpu:2, gpu:0, memory:16, storage:50, created:'1 day ago', cost:'0.31 AKT/hr'},
    {id:'dpl-7g8h9i', name:'stable-diffusion-webui', image:'stable-diffusion', status:'pending', cpu:8, gpu:1, memory:32, storage:100, created:'5 minutes ago', cost:'1.20 AKT/hr'},
    {id:'dpl-0j1k2l', name:'fastchat-api', image:'fastchat', status:'active', cpu:2, gpu:0, memory:4, storage:15, created:'3 days ago', cost:'0.12 AKT/hr'},
    {id:'dpl-3m4n5o', name:'bert-qa-flask', image:'bert', status:'closed', cpu:1, gpu:0, memory:2, storage:10, created:'1 week ago', cost:'0.05 AKT/hr'},
    {id:'dpl-6p7q8r', name:'comfyui-workflow', image:'comfyui', status:'closed', cpu:8, gpu:1, memory:16, storage:80, created:'2 weeks ago', cost:'0.95 AKT/hr'}
  ];

  const grid=document.getElementById('deploymentsGrid');
  const filterButtons=document.querySelectorAll('.filter-btn');
  let currentFilter='all';

  function renderDeployments(filter){
    grid.innerHTML='';
    const filtered=filter==='all'?deployments:deployments.filter(d=>d.status===filter);
    if(!filtered.length){
      grid.innerHTML=`<div class="empty-state"><h3>No ${filter==='all'?'':filter+' '}deployments</h3><p>Get started by deploying a container from the marketplace or the SDL builder.</p><a href="deploy.html" class="btn btn-primary">Create Deployment</a></div>`;
      return;
    }
    filtered.forEach(d=>{
      const card=document.createElement('div');
      card.className='deployment-card';
      card.innerHTML=`
        <div class="deployment-header">
          <div>
            <h3 class="deployment-title">${d.name}</h3>
            <div class="deployment-meta">${d.id} · ${d.image}</div>
          </div>
          <span class="status ${d.status}"><span class="status-dot"></span>${d.status}</span>
        </div>
        <div class="deployment-resources">
          <div class="resource"><div class="resource-value">${d.cpu}</div><div class="resource-label">CPU</div></div>
          <div class="resource"><div class="resource-value">${d.gpu}</div><div class="resource-label">GPU</div></div>
          <div class="resource"><div class="resource-value">${d.memory}GB</div><div class="resource-label">Memory</div></div>
          <div class="resource"><div class="resource-value">${d.storage}GB</div><div class="resource-label">Storage</div></div>
        </div>
        <div class="deployment-footer">
          <div class="deployment-cost">Created <strong>${d.created}</strong> · ${d.cost}</div>
          <div class="card-actions">
            <a href="deploy.html?image=${encodeURIComponent(d.image)}" class="btn btn-secondary">Redeploy</a>
            ${d.status!=='closed'?`<button class="btn btn-secondary" onclick="alert('Closing deployment ${d.id} is not implemented in this demo.')">Close</button>`:''}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  filterButtons.forEach(btn=>{
    btn.addEventListener('click',()=>{
      filterButtons.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter=btn.dataset.filter;
      renderDeployments(currentFilter);
    });
  });

  renderDeployments('all');
</script>

</body>
</html>
