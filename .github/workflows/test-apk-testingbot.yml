name: Test APK on TestingBot

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  testingbot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest APK
        run: |
          curl -sL -o chimera.apk \
            "https://github.com/LocalChimera/localchimera/releases/latest/download/app-arm64-v8a-release.apk"
          ls -lh chimera.apk

      - name: Upload APK to TestingBot
        id: upload
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
        run: |
          RESPONSE=$(curl -s -u "$TESTINGBOT_KEY:$TESTINGBOT_SECRET" \
            -X POST "https://api.testingbot.com/v1/app-upload" \
            -F "file=@chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_url'])")
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Run smoke test on real Android device
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
          TESTINGBOT_APP_URL: ${{ steps.upload.outputs.app_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node testingbot-smoke-test.js
        working-directory: scripts

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testingbot-screenshots
          path: scripts/screenshot-*.png
