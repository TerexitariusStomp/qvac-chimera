name: Test APK on TestingBot

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  testingbot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest APK from Build Mobile APK workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest successful Build Mobile APK run and download its artifact
          AUTH="Authorization: token $GH_TOKEN"
          RUN_ID=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/workflows/build-mobile.yml/runs?status=success&per_page=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['workflow_runs'][0]['id'])")
          echo "Latest successful Build Mobile APK run: $RUN_ID"
          ARTIFACT_ID=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/runs/$RUN_ID/artifacts" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['artifacts'][0]['id'])")
          echo "Artifact ID: $ARTIFACT_ID"
          curl -s -L -H "$AUTH" -H "Accept: application/vnd.github+json" \
            -o chimera-apk.zip \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/artifacts/$ARTIFACT_ID/zip"
          file chimera-apk.zip
          unzip -o chimera-apk.zip
          mv app-debug.apk chimera.apk 2>/dev/null || mv *.apk chimera.apk
          echo "Downloaded APK:"
          ls -lh chimera.apk

      - name: Upload APK to TestingBot
        id: upload
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
        run: |
          RESPONSE=$(curl -s -u "$TESTINGBOT_KEY:$TESTINGBOT_SECRET" \
            -X POST "https://api.testingbot.com/v1/storage" \
            -F "file=@chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_url'])")
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Run smoke test on real Android device
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
          TESTINGBOT_APP_URL: ${{ steps.upload.outputs.app_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node testingbot-smoke-test.js
        working-directory: scripts

      - name: Upload test screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testingbot-screenshots
          path: |
            scripts/screenshot-*.png
            scripts/logcat.txt
            scripts/page-source*.xml
