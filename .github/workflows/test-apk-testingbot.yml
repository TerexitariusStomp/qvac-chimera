name: Test APK on TestingBot

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  testingbot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Expo debug APK from Build Desktop Apps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTH="Authorization: token $GH_TOKEN"
          # Find the latest successful Build Desktop Apps run
          RUN_ID=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/workflows/build-desktop.yml/runs?status=success&per_page=5" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for r in data['workflow_runs']:
            if 'build-android' in str(r.get('jobs', [])) or True:
              print(r['id'])
              break
          ")
          echo "Latest Build Desktop Apps run: $RUN_ID"
          # Get the chimera-android artifact
          ARTIFACT_ID=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/runs/$RUN_ID/artifacts" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['artifacts']:
            if a['name'] == 'chimera-android':
              print(a['id'])
              break
          ")
          echo "Artifact ID: $ARTIFACT_ID"
          curl -s -L -H "$AUTH" -o android-artifact.zip \
            "https://api.github.com/repos/LocalChimera/localchimera/actions/artifacts/$ARTIFACT_ID/zip"
          unzip -o android-artifact.zip -d android-apks
          # Use debug APK for testing (no ProGuard, smaller)
          ls -lh android-apks/
          cp android-apks/app-arm64-v8a-debug.apk chimera.apk 2>/dev/null || \
          cp android-apks/app-arm64-v8a-release.apk chimera.apk
          echo "Using APK for testing:"
          ls -lh chimera.apk

      - name: Upload APK to TestingBot
        id: upload
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
        run: |
          RESPONSE=$(curl -s -u "$TESTINGBOT_KEY:$TESTINGBOT_SECRET" \
            -X POST "https://api.testingbot.com/v1/storage" \
            -F "file=@chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_url'])")
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Create placeholder output files
        run: |
          touch scripts/screenshot-01-launch.png 2>/dev/null || true
          echo "(not captured)" > scripts/logcat-early.txt
          echo "(not captured)" > scripts/logcat.txt
          echo "(not captured)" > scripts/page-source.xml

      - name: Run smoke test on real Android device
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
          TESTINGBOT_APP_URL: ${{ steps.upload.outputs.app_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node testingbot-smoke-test.js
        working-directory: scripts

      - name: List test output files
        if: always()
        run: |
          echo "=== Files in scripts/ ==="
          ls -la scripts/screenshot-*.png scripts/logcat*.txt scripts/page-source*.xml 2>&1 || echo "No matching files found"
          echo "=== All files in scripts/ ==="
          ls -la scripts/ 2>&1

      - name: Upload test screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testingbot-screenshots
          path: |
            scripts/screenshot-*.png
            scripts/logcat*.txt
            scripts/page-source*.xml
          if-no-files-found: ignore
