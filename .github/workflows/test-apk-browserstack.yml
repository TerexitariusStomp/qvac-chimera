name: Test APK on BrowserStack

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  browserstack-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest APK
        run: |
          # Try debug APK first (no ProGuard/R8), fall back to release
          DEBUG_URL="https://github.com/LocalChimera/localchimera/releases/download/v0.1.0-build.55/app-arm64-v8a-debug.apk"
          RELEASE_URL="https://github.com/LocalChimera/localchimera/releases/download/v0.1.0-build.55/app-arm64-v8a-release.apk"
          if curl -fsSL --retry 2 --max-time 60 -o chimera.apk "$DEBUG_URL"; then
            echo "Downloaded DEBUG APK"
          else
            echo "Debug APK not available, trying release APK..."
            curl -fsSL --retry 3 --max-time 120 -o chimera.apk "$RELEASE_URL"
            echo "Downloaded RELEASE APK"
          fi
          ls -lh chimera.apk

      - name: Upload APK to BrowserStack
        id: upload
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          RESPONSE=$(curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_url'])")
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Run smoke test on real Android device
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ steps.upload.outputs.app_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node browserstack-smoke-test.js
        working-directory: scripts

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browserstack-test-artifacts
          path: scripts/*

      - name: Download BrowserStack session logs
        if: always()
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          echo "Fetching recent BrowserStack sessions for this build..."
          curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            "https://api-cloud.browserstack.com/app-automate/builds.json" > /tmp/bs_builds.json
          cat > /tmp/find_build.py << 'PYEOF'
          import sys, json
          data = json.load(sys.stdin)
          for build in data:
              if build.get('automation_build', {}).get('name', '').startswith('build-'):
                  bid = build['automation_build']['hashed_id']
                  print('Found build: ' + bid)
                  break
          else:
              print('No matching build found')
          PYEOF
          python3 /tmp/find_build.py < /tmp/bs_builds.json > /tmp/bs_build_id.txt
          BUILD_ID=$(cat /tmp/bs_build_id.txt | grep "Found build:" | awk '{print $3}')
          if [ -n "$BUILD_ID" ]; then
            curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
              "https://api-cloud.browserstack.com/app-automate/builds/$BUILD_ID/sessions.json" > /tmp/bs_sessions.json
            cat > /tmp/find_sessions.py << 'PYEOF'
            import sys, json
            data = json.load(sys.stdin)
            for session in data:
                sid = session['automation_session']['hashed_id']
                print('Session: ' + sid)
            PYEOF
            python3 /tmp/find_sessions.py < /tmp/bs_sessions.json > /tmp/bs_session_ids.txt
            mkdir -p browserstack-logs
            while IFS= read -r line; do
              SID=$(echo "$line" | awk '{print $2}')
              if [ -n "$SID" ]; then
                echo "Downloading logs for session $SID"
                curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
                  "https://api-cloud.browserstack.com/app-automate/sessions/$SID/logs" \
                  -o "browserstack-logs/session-${SID}.log"
              fi
            done < /tmp/bs_session_ids.txt
            ls -la browserstack-logs/
          fi

      - name: Upload BrowserStack logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browserstack-logs
          path: browserstack-logs/*
