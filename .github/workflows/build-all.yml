name: Build All Platforms
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install qvac deps
        run: cd qvac && npm install
      - name: Run test suite
        run: cd qvac && node --test test/router.test.js test/orchestrator.test.js test/payout.test.js test/payout-http.test.js test/solana.test.js

  build-linux:
    needs: test
    runs-on: ubuntu-22.04
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: actions/setup-go@v5
        with: { go-version: "1.21" }
      - name: Build
        run: |
          cd apps/desktop/supervisor && go build -o supervisor main.go
          mkdir -p ../src-tauri/bin && cp supervisor ../src-tauri/bin/supervisor-x86_64-unknown-linux-gnu
          cd ../../../qvac/frontend && npm install && npm run build
          cd ../../apps/desktop && npm install && npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: apps/desktop/src-tauri/target/release/bundle
  build-windows:
    needs: test
    runs-on: windows-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: "1.21" }
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor; go build -o supervisor.exe main.go
          mkdir -p ../src-tauri/bin; copy supervisor.exe ../src-tauri/bin/supervisor-x86_64-pc-windows-msvc.exe
      - name: Build QVAC frontend
        shell: pwsh
        run: |
          cd qvac/frontend
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          npm run build
      - name: Build desktop frontend
        shell: pwsh
        run: |
          cd apps/desktop
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          npm run build
      - name: Copy QVAC to Tauri resources
        shell: cmd
        run: |
          robocopy qvac apps\desktop\src-tauri\qvac /E /XD node_modules .git target /R:0 /W:0
          if %ERRORLEVEL% GEQ 8 exit /b 1
          exit /b 0
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/desktop/src-tauri/target/release/bundle
  build-macos:
    needs: test
    runs-on: macos-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: "1.21" }
      - name: Build
        run: |
          cd apps/desktop/supervisor && go build -o supervisor main.go
          mkdir -p ../src-tauri/bin && cp supervisor ../src-tauri/bin/supervisor-aarch64-apple-darwin
          cd ../../../qvac/frontend && npm install && npm run build
          cd ../../apps/desktop && npm install && npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: apps/desktop/src-tauri/target/release/bundle
