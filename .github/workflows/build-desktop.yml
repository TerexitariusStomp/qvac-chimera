name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install qvac deps
        run: cd qvac && npm install
      - name: Run test suite
        run: cd qvac && node --test test/router.test.js test/orchestrator.test.js test/payout.test.js test/payout-http.test.js test/solana.test.js

  create-release:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      tag_name: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.1.0-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Chimera ${{ steps.version.outputs.VERSION }}"
          body: "Download the installer for your OS below."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install QVAC backend deps
        shell: pwsh
        run: |
          cd qvac
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          exit 1
      - name: Build QVAC frontend
        shell: pwsh
        run: |
          cd qvac/frontend
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          npm run build
      - name: Install desktop deps
        shell: pwsh
        run: |
          cd apps/desktop
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          exit 1
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        shell: cmd
        run: |
          robocopy qvac apps\desktop\src-tauri\qvac /E /XD node_modules .git target /R:0 /W:0
          if %ERRORLEVEL% GEQ 8 exit /b 1
          exit /b 0
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor iOS
        run: |
          cd qvac/frontend
          npx cap sync ios
      - name: Build iOS app
        run: |
          cd apps/mobile/ios/App
          xcodebuild -project App.xcodeproj -target App -destination 'platform=iOS Simulator,name=iPhone 15' -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Copy iOS app
        run: |
          cd apps/mobile/ios/App
          ls -la build/Release-iphoneos/
          mkdir -p ../../Chimera-iOS
          cp -r build/Release-iphoneos/App.app ../../Chimera-iOS/App.app
      - name: Compress iOS app
        run: |
          cd apps/mobile/ios
          tar -czf Chimera-iOS.tar.gz -C .. Chimera-iOS
      - name: Verify iOS archive exists
        run: |
          ls -la apps/mobile/ios/Chimera-iOS.tar.gz
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-ios
          path: apps/mobile/ios/Chimera-iOS.tar.gz
          if-no-files-found: error

  build-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure npm
        run: npm config set legacy-peer-deps true
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Verify JDK
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk: 29.0.14206865
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Copy frontend to Expo assets
        run: node apps/mobile-expo/scripts/copy-frontend.js
      - name: Install Expo deps
        run: |
          cd apps/mobile-expo
          npm install
      - name: Expo prebuild (Android)
        run: |
          cd apps/mobile-expo
          npx expo prebuild --platform android --clean
      - name: Set Gradle Java home and downgrade Compose compiler
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> apps/mobile-expo/android/gradle.properties
          echo "=== Patching Compose compiler 1.5.15 -> 1.5.14 ==="
          find apps/mobile-expo/node_modules/expo-modules-core -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.toml" -o -name "*.properties" \) -exec sed -i 's/1\.5\.15/1.5.14/g' {} + 2>/dev/null || true
          find apps/mobile-expo/android -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.toml" \) -exec sed -i 's/1\.5\.15/1.5.14/g' {} + 2>/dev/null || true
          echo "=== Verifying patch ==="
          grep -rn "1.5.14\|1.5.15" apps/mobile-expo/node_modules/expo-modules-core/android/ 2>/dev/null || true
          cat apps/mobile-expo/android/build.gradle
      - name: Build Expo APK
        run: |
          cd apps/mobile-expo/android
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew assembleRelease
      - name: Verify Expo APK exists
        run: |
          ls -la apps/mobile-expo/android/app/build/outputs/apk/release/
      - name: Rename Expo APK for release
        run: |
          mkdir -p mobile-build
          cp apps/mobile-expo/android/app/build/outputs/apk/release/app-release.apk mobile-build/Chimera-Expo-Android.apk
      - name: Upload Expo APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-android
          path: mobile-build/Chimera-Expo-Android.apk
          if-no-files-found: error

  upload-mobile-assets:
    needs: [create-release, build-android, build-ios]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-android
          path: mobile-assets/android
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-ios
          path: mobile-assets/ios
      - name: List downloaded assets
        run: |
          echo "Android:"
          ls -la mobile-assets/android/ || true
          echo "iOS:"
          ls -la mobile-assets/ios/ || true
      - name: Upload mobile assets to release
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" mobile-assets/android/* mobile-assets/ios/* --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
