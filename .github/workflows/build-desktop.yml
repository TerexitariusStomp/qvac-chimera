name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      tag_name: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.1.0-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Chimera ${{ steps.version.outputs.VERSION }}"
          body: "Download the installer for your OS below."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor
          go build -o supervisor main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          cp apps/desktop/supervisor/supervisor apps/desktop/src-tauri/bin/supervisor-x86_64-unknown-linux-gnu
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor
          go build -o supervisor.exe main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          copy apps/desktop/supervisor/supervisor.exe apps/desktop/src-tauri/bin/supervisor-x86_64-pc-windows-msvc.exe
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor
          go build -o supervisor main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          cp apps/desktop/supervisor/supervisor apps/desktop/src-tauri/bin/supervisor-aarch64-apple-darwin
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor Android
        run: |
          cd qvac/frontend
          npx cap sync android
      - name: Build debug APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug
      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor iOS
        run: |
          cd qvac/frontend
          npx cap sync ios
      - name: Build iOS app
        run: |
          cd apps/mobile/ios/App
          xcodebuild -project App.xcodeproj -target App -destination 'platform=iOS Simulator,name=iPhone 15' -configuration Release build
          mkdir -p ../../Chimera-iOS
          cp -r build/Release-iphonesimulator/App.app ../../Chimera-iOS/App.app
      - name: Compress iOS app
        run: |
          cd apps/mobile/ios
          tar -czf Chimera-iOS.tar.gz -C ../../ Chimera-iOS
      - name: Upload iOS to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: apps/mobile/ios/Chimera-iOS.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
