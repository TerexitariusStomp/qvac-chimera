name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.1.0-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Chimera ${{ steps.version.outputs.VERSION }}"
          body: "Download the installer for your OS below."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor
          go build -o supervisor main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          cp apps/desktop/supervisor/supervisor apps/desktop/src-tauri/bin/supervisor-x86_64-unknown-linux-gnu
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd apps/desktop/supervisor
          go build -o supervisor.exe main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          copy apps/desktop/supervisor/supervisor.exe apps/desktop/src-tauri/bin/supervisor-x86_64-pc-windows-msvc.exe
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor (universal)
        run: |
          cd apps/desktop/supervisor
          GOARCH=amd64 go build -o supervisor-amd64 main.go
          GOARCH=arm64 go build -o supervisor-arm64 main.go
          lipo -create -output supervisor supervisor-amd64 supervisor-arm64
      - name: Copy supervisor binary
        run: |
          mkdir -p apps/desktop/src-tauri/bin
          cp apps/desktop/supervisor/supervisor apps/desktop/src-tauri/bin/supervisor-universal-apple-darwin
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target universal-apple-darwin"
          releaseId: ${{ needs.create-release.outputs.release_id }}
