name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install qvac deps
        run: cd qvac && npm install
      - name: Run test suite
        run: cd qvac && node --test tests/router.test.js tests/orchestrator.test.js tests/payout.test.js tests/payout-http.test.js tests/solana.test.js tests/auth.test.js

  create-release:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      tag_name: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.1.0-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Chimera ${{ steps.version.outputs.VERSION }}"
          body: "Download the installer for your OS below."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install QVAC backend deps
        shell: pwsh
        run: |
          cd qvac
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          exit 1
      - name: Build QVAC frontend
        shell: pwsh
        run: |
          cd qvac/frontend
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          npm run build
      - name: Install desktop deps
        shell: pwsh
        run: |
          cd apps/desktop
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install attempt $i failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          exit 1
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        shell: cmd
        run: |
          robocopy qvac apps\desktop\src-tauri\qvac /E /XD node_modules .git target /R:0 /W:0
          if %ERRORLEVEL% GEQ 8 exit /b 1
          exit /b 0
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Copy QVAC to Tauri resources
        run: |
          mkdir -p apps/desktop/src-tauri/qvac
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='target' qvac/ apps/desktop/src-tauri/qvac/
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor iOS
        run: |
          cd qvac/frontend
          npx cap sync ios
      - name: Build iOS app (device)
        run: |
          cd apps/mobile/ios/App
          # Build for generic iOS device (not simulator) with explicit build dir
          xcodebuild -project App.xcodeproj -target App -sdk iphoneos -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ENABLE_BITCODE=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
      - name: Package iOS IPA
        run: |
          cd apps/mobile/ios/App
          # Fallback: find .app if CONFIGURATION_BUILD_DIR didn't land where expected
          if [ ! -d build/Release-iphoneos/App.app ]; then
            echo "Searching for App.app..."
            APP_PATH=$(find . -name "App.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: App.app not found"
              find . -type d -name "*.app" || true
              exit 1
            fi
            mkdir -p build/Release-iphoneos
            cp -r "$APP_PATH" build/Release-iphoneos/
          fi
          mkdir -p Payload
          cp -r build/Release-iphoneos/App.app Payload/
          du -sh Payload/App.app
          zip -r Chimera-iOS.ipa Payload
          rm -rf Payload
      - name: Verify iOS artifact size
        run: |
          ls -lh apps/mobile/ios/App/Chimera-iOS.ipa
          SIZE=$(stat -f%z apps/mobile/ios/App/Chimera-iOS.ipa 2>/dev/null || stat -c%s apps/mobile/ios/App/Chimera-iOS.ipa)
          MB=$(awk "BEGIN {printf \"%.1f\", $SIZE/1024/1024}")
          echo "IPA size: ${MB}MB"
          if [ "$SIZE" -gt 4194304000 ]; then echo "ERROR: IPA exceeds 4GB hard limit"; exit 1; fi
          if [ "$SIZE" -gt 209715200 ]; then echo "WARNING: IPA exceeds 200MB OTA threshold"; fi
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-ios
          path: apps/mobile/ios/App/Chimera-iOS.ipa
          if-no-files-found: error

  build-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure npm
        run: npm config set legacy-peer-deps true
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Verify JDK
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Copy frontend to Expo assets
        run: node apps/mobile-expo/scripts/copy-frontend.js
      - name: Install Expo deps
        run: |
          cd apps/mobile-expo
          for i in 1 2 3; do
            npm install && break
            echo "npm install attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Expo prebuild (Android)
        run: |
          cd apps/mobile-expo
          npx expo prebuild --platform android --clean
      - name: Set Gradle Java home, heap, and downgrade Compose compiler
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> apps/mobile-expo/android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> apps/mobile-expo/android/gradle.properties
          echo "=== Patching Compose compiler 1.5.15 -> 1.5.14 ==="
          find apps/mobile-expo/node_modules/expo-modules-core -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.toml" -o -name "*.properties" \) -exec sed -i 's/1\.5\.15/1.5.14/g' {} + 2>/dev/null || true
          find apps/mobile-expo/android -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.toml" \) -exec sed -i 's/1\.5\.15/1.5.14/g' {} + 2>/dev/null || true
          echo "=== Verifying patch ==="
          grep -rn "1.5.14\|1.5.15" apps/mobile-expo/node_modules/expo-modules-core/android/ 2>/dev/null || true
          cat apps/mobile-expo/android/build.gradle
      - name: Patch Android build for size optimization
        run: |
          APP_BUILD=apps/mobile-expo/android/app/build.gradle
          echo "=== Before patch ==="
          cat "$APP_BUILD"
          echo "=== Inserting ABI + density splits + packaging ==="
          python3 apps/mobile-expo/scripts/patch-android-build.py "$APP_BUILD"
          echo "=== After patch ==="
          cat "$APP_BUILD"
      - name: Patch AndroidManifest for extractNativeLibs and largeHeap
        run: |
          MANIFEST=apps/mobile-expo/android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            if ! grep -q 'extractNativeLibs' "$MANIFEST"; then
              sed -i 's/<application/<application android:extractNativeLibs="true"/' "$MANIFEST"
            fi
            if ! grep -q 'largeHeap' "$MANIFEST"; then
              sed -i 's/<application/<application android:largeHeap="true"/' "$MANIFEST"
            fi
          fi
      - name: Generate ProGuard keep rules for QVAC SDK
        run: |
          PROGUARD=apps/mobile-expo/android/app/proguard-rules.pro
          echo '' | base64 -d > "$PROGUARD"
          echo "=== ProGuard rules ==="
          cat "$PROGUARD"
      - name: Build Expo AAB (Play Store) and APKs
        run: |
          cd apps/mobile-expo/android
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew bundleRelease -x mergeReleaseNativeDebugMetadata
          ./gradlew assembleRelease -x mergeReleaseNativeDebugMetadata
      - name: Show build outputs and verify sizes
        run: |
          echo "=== AAB ==="
          ls -lh apps/mobile-expo/android/app/build/outputs/bundle/release/
          echo "=== APKs ==="
          ls -lh apps/mobile-expo/android/app/build/outputs/apk/release/
          echo "=== Size checks ==="
          AAB=apps/mobile-expo/android/app/build/outputs/bundle/release/app-release.aab
          if [ -f "$AAB" ]; then
            SIZE=$(stat -c%s "$AAB")
            MB=$(awk "BEGIN {printf \"%.1f\", $SIZE/1024/1024}")
            echo "AAB: ${MB}MB"
            if [ "$SIZE" -gt 524288000 ]; then echo "ERROR: AAB >500MB (Google Play limit)"; exit 1; fi
          fi
          for apk in apps/mobile-expo/android/app/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            SIZE=$(stat -c%s "$apk")
            MB=$(awk "BEGIN {printf \"%.1f\", $SIZE/1024/1024}")
            NAME=$(basename "$apk")
            echo "APK $NAME: ${MB}MB"
            if [ "$SIZE" -gt 209715200 ]; then echo "WARNING: APK >200MB"; fi
          done
      - name: Rename and stage artifacts
        run: |
          mkdir -p mobile-build
          cp apps/mobile-expo/android/app/build/outputs/bundle/release/app-release.aab mobile-build/Chimera-Android.aab
          for apk in apps/mobile-expo/android/app/build/outputs/apk/release/*; do
            [ -f "$apk" ] || continue
            # Skip debug APKs — they are not release artifacts
            if [[ "$(basename "$apk")" == *debug* ]]; then
              echo "Skipping debug APK: $apk"
              continue
            fi
            cp "$apk" mobile-build/
          done
          if [ ! -f mobile-build/app-arm64-v8a-release.apk ] && [ -f apps/mobile-expo/android/app/build/outputs/apk/release/app-release.apk ]; then
            cp apps/mobile-expo/android/app/build/outputs/apk/release/app-release.apk mobile-build/Chimera-Android-universal.apk
          fi
      - name: Upload mobile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chimera-android
          path: mobile-build/*
          if-no-files-found: error

  upload-mobile-assets:
    needs: [create-release, build-android, build-ios]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-android
          path: mobile-assets/android
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-ios
          path: mobile-assets/ios
      - name: List downloaded assets
        run: |
          echo "Android:"
          ls -la mobile-assets/android/ || true
          echo "iOS:"
          ls -la mobile-assets/ios/ || true
      - name: Upload mobile assets to release
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" mobile-assets/android/* mobile-assets/ios/* --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
