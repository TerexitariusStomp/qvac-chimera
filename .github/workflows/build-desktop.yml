name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      tag_name: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.1.0-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Chimera ${{ steps.version.outputs.VERSION }}"
          body: "Download the installer for your OS below."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-unknown-linux-gnu"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target x86_64-pc-windows-msvc"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Install QVAC backend deps
        run: |
          cd qvac
          npm install
      - name: Build QVAC frontend
        run: |
          cd qvac/frontend
          npm install
          npm run build
      - name: Install desktop deps
        run: |
          cd apps/desktop
          npm install
      - name: Build desktop frontend
        run: |
          cd apps/desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop
          args: "--target aarch64-apple-darwin"
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor Android
        run: |
          cd qvac/frontend
          npx cap sync android
      - name: Build debug APK
        run: |
          cd apps/mobile/android
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Verify APK exists
        run: |
          ls -la apps/mobile/android/app/build/outputs/apk/debug/
      - name: Rename APK for release
        run: |
          mkdir -p mobile-build
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk mobile-build/Chimera-Android.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-android
          path: mobile-build/Chimera-Android.apk
          if-no-files-found: error
  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      - name: Install frontend deps
        run: |
          cd qvac/frontend
          npm install
      - name: Build frontend
        run: |
          cd qvac/frontend
          npm run build
      - name: Sync Capacitor iOS
        run: |
          cd qvac/frontend
          npx cap sync ios
      - name: Build iOS app
        run: |
          cd apps/mobile/ios/App
          xcodebuild -project App.xcodeproj -target App -destination 'platform=iOS Simulator,name=iPhone 15' -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Copy iOS app
        run: |
          cd apps/mobile/ios/App
          ls -la build/Release-iphoneos/
          mkdir -p ../../Chimera-iOS
          cp -r build/Release-iphoneos/App.app ../../Chimera-iOS/App.app
      - name: Compress iOS app
        run: |
          cd apps/mobile/ios
          tar -czf Chimera-iOS.tar.gz -C .. Chimera-iOS
      - name: Verify iOS archive exists
        run: |
          ls -la apps/mobile/ios/Chimera-iOS.tar.gz
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-ios
          path: apps/mobile/ios/Chimera-iOS.tar.gz
          if-no-files-found: error
  upload-mobile-assets:
    needs: [create-release, build-android, build-ios]
    runs-on: ubuntu-22.04
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-android
          path: mobile-assets/android
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: chimera-ios
          path: mobile-assets/ios
      - name: List downloaded assets
        run: |
          echo "Android:"
          ls -la mobile-assets/android/ || true
          echo "iOS:"
          ls -la mobile-assets/ios/ || true
      - name: Upload mobile assets to release
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" mobile-assets/android/* mobile-assets/ios/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
