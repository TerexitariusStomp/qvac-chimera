name: Test APK on LambdaTest

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  lambdatest-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest APK
        run: |
          curl -sL -o chimera.apk \
            "https://github.com/LocalChimera/localchimera/releases/download/v0.1.0-build.27/app-arm64-v8a-release.apk"
          ls -lh chimera.apk

      - name: Upload APK to LambdaTest
        id: upload
        env:
          LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
        run: |
          RESPONSE=$(curl -s -u "$LT_USERNAME:$LT_ACCESS_KEY" \
            -X POST "https://manual-api.lambdatest.com/app/upload/realDevice" \
            -F "appFile=@chimera.apk" \
            -F "type=android" \
            -F "name=chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_id'])")
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Run smoke test on LambdaTest real device
        env:
          LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
          LT_APP_ID: ${{ steps.upload.outputs.app_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node lambdatest-smoke-test.js
        working-directory: scripts

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambdatest-screenshots
          path: scripts/screenshot-*.png
