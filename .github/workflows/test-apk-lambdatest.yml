name: Test APK on LambdaTest

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  lambdatest-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest release APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTH="Authorization: token $GH_TOKEN"
          APK_URL=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/releases?per_page=20" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          withAssets = [r for r in data if r.get('assets')]
          withAssets.sort(key=lambda r: r['created_at'], reverse=True)
          for rel in withAssets:
            for a in rel['assets']:
              if 'x86_64' in a['name'].lower() and a['name'].endswith('.apk') and 'debug' not in a['name'].lower():
                print(a['browser_download_url'])
                sys.exit(0)
          for rel in withAssets:
            for a in rel['assets']:
              if 'arm64' in a['name'].lower() and a['name'].endswith('.apk') and 'debug' not in a['name'].lower():
                print(a['browser_download_url'])
                sys.exit(0)
          ")
          echo "Downloading APK from: $APK_URL"
          curl -s -L -H "$AUTH" -o chimera.apk "$APK_URL"
          echo "Downloaded APK:"
          ls -lh chimera.apk

      - name: Upload APK to LambdaTest
        id: upload
        env:
          LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
        run: |
          RESPONSE=$(curl -s -u "$LT_USERNAME:$LT_ACCESS_KEY" \
            -X POST "https://manual-api.lambdatest.com/app/upload/virtualDevice" \
            -F "appFile=@chimera.apk" \
            -F "name=chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('app_url') or d.get('app_id') or '')")
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "App URL: $APP_ID"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Create placeholder output files
        run: |
          touch scripts/screenshot-01-launch.png 2>/dev/null || true
          echo "(not captured)" > scripts/logcat-early.txt
          echo "(not captured)" > scripts/logcat.txt
          echo "(not captured)" > scripts/page-source.xml

      - name: Run smoke test on LambdaTest real device
        env:
          LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
          LT_APP_ID: ${{ steps.upload.outputs.app_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node lambdatest-smoke-test.js
        working-directory: scripts

      - name: List test output files
        if: always()
        run: |
          echo "=== Files in scripts/ ==="
          ls -la scripts/screenshot-*.png scripts/logcat*.txt scripts/page-source*.xml 2>&1 || echo "No matching files"

      - name: Upload test screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambdatest-screenshots
          path: |
            scripts/screenshot-*.png
            scripts/logcat*.txt
            scripts/page-source*.xml
          if-no-files-found: ignore
