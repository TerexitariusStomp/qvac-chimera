version: '3.8'

services:
  routstr:
    image: ghcr.io/routstr/routstr:latest
    container_name: routstr-chimera
    ports:
      - "8000:8000"
    volumes:
      - routstr-data:/data
    env_file:
      - ../.routstr/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  routstr-data:
    driver: local
