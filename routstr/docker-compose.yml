services:
  routstr:
    # Public image not yet available — build from source
    # Cloned to /tmp/routstr-core during setup
    build:
      context: /tmp/routstr-core
      dockerfile: Dockerfile
    container_name: routstr-chimera
    ports:
      - "8000:8000"
    volumes:
      - routstr-data:/data
      - /tmp/routstr-core/keys.db:/app/keys.db
    env_file:
      - /home/user/.routstr/.env
    environment:
      - HTTP_URL=http://10.137.0.9:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  routstr-data:
    driver: local
