version: '3.8'

services:
  qvac-chimera:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qvac-chimera
    ports:
      - "3002:3002"
    volumes:
      - chimera-wiki:/app/llmwiki-data
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: always
    networks:
      - chimera-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chimera-network:
    driver: bridge

volumes:
  chimera-wiki:
    driver: local
